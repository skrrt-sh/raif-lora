name: vLLM plugin CI

# Lint + test for the `raif-vllm` plugin package (packages/vllm). GPU-free: the
# 3 vLLM-shim tests `importorskip` and skip cleanly on the runner (no vLLM/CUDA),
# while the pure decode/inject/route/structured logic runs in full.
#
# raif-format (>=0.6, with schema_bridge/stream) is on PyPI and installs as a
# normal dependency of the plugin.

on:
  push:
    branches: [main]
    paths:
      - "packages/vllm/**"
      - ".github/workflows/vllm-ci.yml"
  pull_request:
    paths:
      - "packages/vllm/**"
      - ".github/workflows/vllm-ci.yml"

# Default-deny at the top level. The single job re-grants only read access.
permissions:
  contents: read

concurrency:
  group: vllm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Harden runner
        # pin to SHA
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout raif-lora
        # pin to SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        # pin to SHA
        uses: actions/setup-python@e9d6f990972a57673cdb72ec29e19d42ba28880f # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the plugin (pulls raif-format>=0.6 from PyPI) + dev deps
        working-directory: packages/vllm
        run: |
          python -m pip install --upgrade pip
          python -m pip install . ruff pytest

      - name: Lint (ruff)
        working-directory: packages/vllm
        run: ruff check

      - name: Test (pytest)
        working-directory: packages/vllm
        run: PYTHONPATH=. pytest tests -q
