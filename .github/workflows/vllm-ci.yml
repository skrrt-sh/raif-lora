name: vLLM plugin CI

# Lint + test for the `raif-vllm` plugin package (packages/vllm). GPU-free: the
# 3 vLLM-shim tests `importorskip` and skip cleanly on the runner (no vLLM/CUDA),
# while the pure decode/inject/route/structured logic runs in full.
#
# The plugin imports `raif.schema_bridge`, which landed on raif-standard `main`
# (PR #13) but is not yet released to PyPI. CI therefore checks out the companion
# repo at `main` and installs `raif-format` editable from it. Once raif-format>=0.6
# ships to PyPI, drop the second checkout and depend on the published package.

on:
  push:
    branches: [main]
    paths:
      - "packages/vllm/**"
      - ".github/workflows/vllm-ci.yml"
  pull_request:
    paths:
      - "packages/vllm/**"
      - ".github/workflows/vllm-ci.yml"

# Default-deny at the top level. The single job re-grants only read access.
permissions:
  contents: read

concurrency:
  group: vllm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Harden runner
        # pin to SHA
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout raif-lora
        # pin to SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout raif-standard (raif-format with schema_bridge)
        # pin to SHA — TODO: remove once raif-format>=0.6 is on PyPI.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: skrrt-sh/raif-standard
          ref: main
          path: raif-standard
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        # pin to SHA
        uses: actions/setup-python@e9d6f990972a57673cdb72ec29e19d42ba28880f # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install raif-format (editable, from companion repo) + plugin dev deps
        working-directory: packages/vllm
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "${{ github.workspace }}/raif-standard/packages/py"
          python -m pip install ruff pytest

      - name: Lint (ruff)
        working-directory: packages/vllm
        run: ruff check

      - name: Test (pytest)
        working-directory: packages/vllm
        run: PYTHONPATH=. pytest tests -q
